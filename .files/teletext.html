<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teletext Studio — Sublatent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #030303; min-height: 100vh; }
    /* Hide Babel loading flash */
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + ReactDOM (production builds) -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <!-- Babel standalone for in-browser JSX transpilation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;


// ─── Constants ────────────────────────────────────────────────────────────────
const COLS = 40, ROWS = 25, CW = 16, CH = 19;
const W = COLS * CW, H = ROWS * CH;

const PAL   = ['#000000','#CC0000','#00BB00','#CCCC00','#0000CC','#CC00CC','#00CCCC','#FFFFFF'];
const PNAME = ['Black','Red','Green','Yellow','Blue','Magenta','Cyan','White'];
const BLOCKS = [' ','█','▀','▄','▌','▐','▖','▗','▘','▙','▚','▛','▜','▝','▞','▟','░','▒','▓','▬'];
const SYMS   = ['♪','♫','★','●','◆','■','□','♥','≈','∞','~','#','@','*','+','=','|',':','·','—'];

const mkCell  = (c = ' ', f = 7, b = 0) => ({ char: c, fg: f, bg: b });
const mkGrid  = () => Array.from({ length: ROWS }, () => Array.from({ length: COLS }, () => mkCell()));
const clone   = g => g.map(r => r.map(c => ({ ...c })));

// ─── Color Palettes ───────────────────────────────────────────────────────────
// Each palette maps to indices in PAL. Used for pattern generation & AI hints.
const PALETTES = {
  full:    { label: '8-BIT FULL',     colors: [0,1,2,3,4,5,6,7], bg: 0 },
  candy:   { label: '✦ CANDY',        colors: [1,2,3,5,6,7],     bg: 0 },
  ocean:   { label: '≈ OCEAN',        colors: [4,6,7,0],          bg: 4 },
  fire:    { label: '★ FIRE',         colors: [1,3,5,7],          bg: 0 },
  matrix:  { label: '▓ MATRIX',       colors: [0,2,3,7],          bg: 0 },
  purple:  { label: '◆ DEEP PURPLE',  colors: [0,4,5,6,7],        bg: 0 },
  pastel:  { label: '□ PASTEL',       colors: [2,3,6,7,5],        bg: 7 },
  mono:    { label: '■ MONOCHROME',   colors: [0,7],              bg: 0 },
};

// ─── Canvas Renderer ──────────────────────────────────────────────────────────
function drawGrid(ctx, grid, cursor, sc = 1) {
  const cw = CW * sc, ch = CH * sc;
  ctx.textBaseline = 'top'; ctx.textAlign = 'left';
  ctx.font = `${Math.round(ch)}px monospace`;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const { char, fg, bg } = grid[r][c];
      const x = c * cw, y = r * ch;
      ctx.fillStyle = PAL[bg]; ctx.fillRect(x, y, cw, ch);
      if (char !== ' ') { ctx.fillStyle = PAL[fg]; ctx.fillText(char, x, y); }
    }
  }
  if (cursor) {
    const { col, row } = cursor;
    ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 1.5;
    ctx.strokeRect(col * cw + .5, row * ch + .5, cw - 1, ch - 1);
    if ((Date.now() / 500 | 0) & 1) {
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(col * cw + 1, row * ch + 1, cw - 2, ch - 2);
    }
  }
}

// ─── AI Command Executor ──────────────────────────────────────────────────────
function runCmds(commands) {
  const g = mkGrid();
  if (!Array.isArray(commands)) return g;
  const cl = (v, a, b) => Math.max(a, Math.min(b, Number(v) || 0));
  for (const cmd of commands) {
    try {
      switch (cmd.type) {
        case 'fill':
          for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++)
            g[r][c] = mkCell(cmd.char ?? ' ', cmd.fg ?? 7, cmd.bg ?? 0); break;
        case 'fillRow': {
          const row = cl(cmd.row, 0, ROWS-1);
          for (let c = 0; c < COLS; c++) g[row][c] = mkCell(cmd.char ?? ' ', cmd.fg ?? 7, cmd.bg ?? 0); break;
        }
        case 'fillRect':
          for (let r = cl(cmd.r1,0,ROWS-1); r <= cl(cmd.r2,0,ROWS-1); r++)
            for (let c = cl(cmd.c1,0,COLS-1); c <= cl(cmd.c2,0,COLS-1); c++)
              g[r][c] = mkCell(cmd.char ?? ' ', cmd.fg ?? 7, cmd.bg ?? 0); break;
        case 'text': {
          const row = cl(cmd.row,0,ROWS-1), sc = cl(cmd.col,0,COLS-1), t = String(cmd.text ?? '');
          for (let i = 0; i < t.length && sc+i < COLS; i++) g[row][sc+i] = mkCell(t[i], cmd.fg??7, cmd.bg??0); break;
        }
        case 'cell': {
          const r = cl(cmd.row,0,ROWS-1), c = cl(cmd.col,0,COLS-1);
          g[r][c] = mkCell(cmd.char ?? ' ', cmd.fg ?? 7, cmd.bg ?? 0); break;
        }
        case 'hline': {
          const row = cl(cmd.row,0,ROWS-1);
          for (let c = 0; c < COLS; c++) g[row][c] = mkCell(cmd.char ?? '─', cmd.fg??7, cmd.bg??0); break;
        }
        case 'vline': {
          const col = cl(cmd.col,0,COLS-1);
          for (let r = 0; r < ROWS; r++) g[r][col] = mkCell(cmd.char ?? '│', cmd.fg??7, cmd.bg??0); break;
        }
        case 'eqbar': {
          const col = cl(cmd.col,0,COLS-1), h = cl(cmd.height,0,ROWS);
          for (let r = ROWS-h; r < ROWS; r++) g[r][col] = mkCell('█', cmd.fg??2, cmd.bg??0); break;
        }
        case 'wave': {
          const mid = cl(cmd.row,0,ROWS-1), amp = cl(cmd.amplitude,1,10), ph = Number(cmd.phase)||0;
          for (let c = 0; c < COLS; c++) {
            const y = Math.round(Math.sin(c*0.3+ph)*amp), rr = cl(mid+y,0,ROWS-1);
            g[rr][c] = mkCell('█', cmd.fg??6, 0);
            if (rr > 0)        g[rr-1][c] = mkCell('▀', cmd.fg??6, 0);
            if (rr < ROWS-1)   g[rr+1][c] = mkCell('▄', cmd.fg??6, 0);
          } break;
        }
      }
    } catch (_) {}
  }
  return g;
}

// ─── Thumbnail ────────────────────────────────────────────────────────────────
function makeThumb(grid) {
  const sc = 3, cv = document.createElement('canvas');
  cv.width = COLS*sc; cv.height = ROWS*sc;
  const ctx = cv.getContext('2d');
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const { bg, fg, char } = grid[r][c];
    ctx.fillStyle = PAL[bg]; ctx.fillRect(c*sc, r*sc, sc, sc);
    if (char !== ' ') { ctx.fillStyle = PAL[fg]; ctx.fillRect(c*sc, r*sc, sc, sc); }
  }
  return cv.toDataURL();
}

// ─── Pattern Generator ────────────────────────────────────────────────────────
function genSymbolPattern(palKey = 'ocean', seed = Date.now()) {
  const p = PALETTES[palKey];
  const cols = p.colors, bg = p.bg;
  let s = seed >>> 0;
  const rnd = () => { s=(s*1664525+1013904223)&0xffffffff; return (s>>>0)/0x100000000; };
  const rc  = () => cols[Math.floor(rnd()*cols.length)];
  const SCHARS = ['×','○','+','·','●','◆','░','▒'];
  const g = mkGrid();
  const bgc = bg;
  // Background fill
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) g[r][c] = mkCell(' ', bgc, bgc);
  // Flowing density map using sine
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const density = (Math.sin(r*0.4+c*0.3)*0.5+0.5) * (Math.cos(r*0.6-c*0.2)*0.5+0.5);
    if (rnd() < density*0.9+0.15) {
      const ch = SCHARS[Math.floor(rnd()*SCHARS.length)];
      g[r][c] = mkCell(ch, rc(), bgc);
    }
  }
  return g;
}

// ─── Templates ────────────────────────────────────────────────────────────────
function tplConcentric(palKey = 'full') {
  const p = PALETTES[palKey];
  const cols = p.colors;
  const g = mkGrid();
  // Fill background with outermost color
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++)
    g[r][c] = mkCell('█', cols[0], cols[0]);
  // Draw concentric rectangles inward
  const rings = Math.min(Math.floor(Math.min(ROWS, COLS) / 2), cols.length * 2);
  for (let i = 1; i < rings; i++) {
    const col = cols[i % cols.length];
    const r1 = i, c1 = i * 2, r2 = ROWS - 1 - i, c2 = COLS - 1 - i * 2;
    if (r1 > r2 || c1 > c2) break;
    // top + bottom rows
    for (let c = c1; c <= c2; c++) {
      g[r1][c] = mkCell('█', col, col);
      g[r2][c] = mkCell('█', col, col);
    }
    // left + right cols
    for (let r = r1; r <= r2; r++) {
      g[r][c1] = mkCell('█', col, col);
      g[r][c2] = mkCell('█', col, col);
    }
  }
  return g;
}

function tplDither(palKey = 'full') {
  const p = PALETTES[palKey];
  const cols = p.colors;
  const g = mkGrid();
  const DCHARS = [' ', '░', '▒', '▓', '█'];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      // Diagonal gradient: 0 at top-left, 1 at bottom-right
      const t = (r / (ROWS - 1) + c / (COLS - 1)) / 2;
      // Map t to a dither char
      const di = Math.min(Math.floor(t * DCHARS.length), DCHARS.length - 1);
      // Map t to a color from the palette
      const ci = Math.min(Math.floor(t * cols.length), cols.length - 1);
      const fg = cols[ci];
      const bgci = Math.max(0, ci - 1);
      const bg2 = cols[bgci];
      g[r][c] = mkCell(DCHARS[di], fg, bg2);
    }
  }
  return g;
}

function tplNoise(palKey = 'full', seed = Date.now()) {
  const p = PALETTES[palKey];
  const cols = p.colors, bgIdx = p.bg;
  let s = seed >>> 0;
  const rnd = () => { s=(s*1664525+1013904223)&0xffffffff; return (s>>>0)/0x100000000; };
  const NCHARS = ['░', '▒', '▓', '█', ' ', ' ', ' '];
  const g = mkGrid();
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    // Layered noise via summed sines (cheap value noise)
    const n = (Math.sin(r*1.3+c*0.7)*0.5+0.5)
            * (Math.cos(r*0.5-c*1.1)*0.5+0.5)
            + rnd() * 0.25;
    const t = Math.min(n, 1);
    const ch = NCHARS[Math.floor(t * NCHARS.length)];
    const ci = Math.min(Math.floor(t * cols.length), cols.length - 1);
    g[r][c] = mkCell(ch, cols[ci], bgIdx);
  }
  return g;
}

const TPLS = [
  { id:'blank',       label:'■  BLANK',           fn: () => mkGrid()         },
  { id:'concentric',  label:'◆  CONCENTRIC',       fn: () => tplConcentric('full') },
  { id:'dither',      label:'░  DITHER GRADIENT',  fn: () => tplDither('full')     },
  { id:'noise',       label:'▒  NOISE FIELD',      fn: () => tplNoise('full', Math.random()*999999|0) },
  { id:'symbol',      label:'×  SYMBOL GRID',      fn: () => genSymbolPattern('ocean', Math.random()*99999|0) },
];

const TOOLS = [
  {id:'paint',label:'✏  PAINT'},{id:'erase',label:'✕  ERASE'},
  {id:'fill', label:'▣  FILL'}, {id:'text', label:'T  TEXT'},
];

const QUICK_PROMPTS = [
  'dark cloudy night sky','ocean waves breaking',
  'desert heat mirage','forest depth shadow',
  'city lights rain','mountain silhouette dusk',
  'abstract mosaic pattern','deep space nebula',
  'flowing water current','volcanic eruption glow',
];

// ─── AI System Prompt ─────────────────────────────────────────────────────────
// max_tokens set to 8192 and prompt optimised to use BATCH commands (fillRect)
// so animation frames stay well within limits
const aiSys = (isAnim, n, palKey) => {
  const pal = PALETTES[palKey];
  const colorHints = pal.colors.map(i => `${i}=${PNAME[i]}`).join(', ');
  return `You are a teletext visual art generator. Create abstract/atmospheric visual art.
Grid: 40 columns × 25 rows. Row 0=top, Col 0=left.
Colors 0-7: 0=Black 1=Red 2=Green 3=Yellow 4=Blue 5=Magenta 6=Cyan 7=White
PREFERRED PALETTE for this request: ${colorHints}

CRITICAL RULES:
- Return ONLY raw JSON. No markdown, no backticks, no explanation whatsoever.
- Do NOT include any text, words, letters, numbers, names, titles, or labels in the output.
- Pure visual art only — shapes, patterns, gradients, landscapes, abstract forms.
- Use fillRect heavily — it is compact and efficient. Avoid individual cell commands.
- Each frame must use AT MOST 40 commands total to keep JSON size small.

${isAnim
  ? `Return: {"frames":[cmds_0,...,cmds_${n-1}]} — exactly ${n} arrays, each ≤40 commands, forming a smooth loop.`
  : `Return: a JSON array at root — ≤60 drawing command objects.`}

Command types (all values integers):
{"type":"fill","char":"█","fg":C,"bg":C}                   — fill entire grid
{"type":"fillRect","r1":R,"c1":C,"r2":R,"c2":C,"char":"█","fg":C,"bg":C} — fill rectangle
{"type":"fillRow","row":N,"char":"X","fg":C,"bg":C}        — fill one row
{"type":"hline","row":N,"char":"─","fg":C,"bg":C}          — horizontal line
{"type":"vline","col":N,"char":"│","fg":C,"bg":C}          — vertical line
{"type":"eqbar","col":N,"height":H,"fg":C}                 — EQ bar from bottom
{"type":"wave","row":N,"amplitude":A,"fg":C,"phase":P}     — sine wave (P in radians)

Block chars: █▀▄▌▐░▒▓
NO TEXT. NO LETTERS. NO NUMBERS. Pure shapes and patterns only.
${isAnim
  ? `ANIMATION: Each frame evolves gradually. Change 5-10 fillRects, shift wave phases by 0.4-0.8 per frame, vary eqbar heights ±2-3, cycle colors slowly. First and last frames should connect smoothly.`
  : ''}`;
};

// ─── Main Component ───────────────────────────────────────────────────────────
function TeletextStudio() {
  const canvasRef = useRef(null);

  const [frames,    setFrames]    = useState([mkGrid()]);
  const [fi,        setFi]        = useState(0);
  const [playing,   setPlaying]   = useState(false);
  const [fps,       setFps]       = useState(4);
  const [thumbs,    setThumbs]    = useState([]);

  const [tool,      setTool]      = useState('paint');
  const [fg,        setFg]        = useState(7);
  const [bg,        setBg]        = useState(0);
  const [selChar,   setSel]       = useState('█');
  const [cursor,    setCursor]    = useState(null);
  const [charTab,   setCharTab]   = useState('blocks');
  const [hov,       setHov]       = useState(null);
  const [hist,      setHist]      = useState([]);
  const [msg,       setMsg]       = useState('READY');

  // AI
  const [aiOpen,    setAiOpen]    = useState(false);
  const [aiPr,      setAiPr]      = useState('');
  const [aiMode,    setAiMode]    = useState('animation');
  const [aiN,       setAiN]       = useState(6);
  const [aiPalKey,  setAiPalKey]  = useState('full');
  const [gen,       setGen]       = useState(false);
  const [genMsg,    setGenMsg]    = useState('');
  const [exporting, setExporting] = useState(false);

  // Pattern
  const [patPalKey, setPatPalKey] = useState('candy');
  const [patType,   setPatType]   = useState('symbol');

  // Stable refs
  const toolR = useRef('paint'), fgR = useRef(7), bgR = useRef(0), chrR = useRef('█');
  const curR  = useRef(null), framesR = useRef(frames), fiR = useRef(0);
  const drawing = useRef(false);

  useEffect(() => { toolR.current   = tool;    }, [tool]);
  useEffect(() => { fgR.current     = fg;      }, [fg]);
  useEffect(() => { bgR.current     = bg;      }, [bg]);
  useEffect(() => { chrR.current    = selChar; }, [selChar]);
  useEffect(() => { curR.current    = cursor;  }, [cursor]);
  useEffect(() => { framesR.current = frames;  }, [frames]);
  useEffect(() => { fiR.current     = fi;      }, [fi]);

  const curGrid  = frames[fi] || mkGrid();
  const curGridR = useRef(curGrid);
  useEffect(() => { curGridR.current = curGrid; }, [curGrid]);

  useEffect(() => { setThumbs(frames.map(f => makeThumb(f))); }, [frames]);

  // Playback
  useEffect(() => {
    if (!playing) return;
    const id = setInterval(() => setFi(i => (i+1) % framesR.current.length), 1000/fps);
    return () => clearInterval(id);
  }, [playing, fps]);

  // RAF render
  useEffect(() => {
    const ctx = canvasRef.current?.getContext('2d');
    if (!ctx) return;
    let alive = true;
    const loop = () => {
      if (!alive) return;
      drawGrid(ctx, curGridR.current, toolR.current === 'text' ? curR.current : null);
      requestAnimationFrame(loop);
    };
    requestAnimationFrame(loop);
    return () => { alive = false; };
  }, []);

  useEffect(() => {
    const h = e => { if (e.key === 'Escape') setAiOpen(false); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  // ── Frame ops ──
  const patchFrame = fn => setFrames(prev => {
    const n = [...prev]; n[fiR.current] = fn(prev[fiR.current]); return n;
  });
  const addFrame = () => {
    setFrames(p => { const n=[...p]; n.splice(fiR.current+1,0,mkGrid()); return n; });
    setFi(i => i+1); setMsg('FRAME ADDED');
  };
  const dupFrame = () => {
    setFrames(p => { const n=[...p]; n.splice(fiR.current+1,0,clone(p[fiR.current])); return n; });
    setFi(i => i+1); setMsg('FRAME DUPLICATED');
  };
  const delFrame = () => {
    if (frames.length === 1) { setFrames([mkGrid()]); setMsg('CLEARED'); return; }
    setFrames(p => { const n=[...p]; n.splice(fiR.current,1); return n; });
    setFi(i => Math.min(i, frames.length-2)); setMsg('FRAME DELETED');
  };

  // ── Drawing ──
  const getPos = e => {
    const cv = canvasRef.current, rect = cv.getBoundingClientRect();
    const col = Math.floor((e.clientX-rect.left) * (W/rect.width) / CW);
    const row = Math.floor((e.clientY-rect.top)  * (H/rect.height) / CH);
    return col>=0&&col<COLS&&row>=0&&row<ROWS ? {col,row} : null;
  };

  const applyTool = (g, col, row) => {
    const t = toolR.current;
    if (t === 'paint') {
      const n=clone(g); n[row][col]=mkCell(chrR.current,fgR.current,bgR.current); return n;
    }
    if (t === 'erase') { const n=clone(g); n[row][col]=mkCell(' ',7,0); return n; }
    if (t === 'fill') {
      const src=mkCell(chrR.current,fgR.current,bgR.current), tgt=g[row][col];
      if (tgt.char===src.char&&tgt.fg===src.fg&&tgt.bg===src.bg) return g;
      const n=clone(g), stack=[[col,row]];
      while (stack.length) {
        const [c,r]=stack.pop();
        if (c<0||c>=COLS||r<0||r>=ROWS) continue;
        const cell=n[r][c];
        if (cell.char!==tgt.char||cell.fg!==tgt.fg||cell.bg!==tgt.bg) continue;
        n[r][c]={...src};
        stack.push([c+1,r],[c-1,r],[c,r+1],[c,r-1]);
      }
      return n;
    }
    return g;
  };

  const onDown = e => {
    e.preventDefault();
    const pos=getPos(e); if (!pos) return;
    const {col,row}=pos;
    if (toolR.current==='text') { setCursor({col,row}); setMsg(`TEXT C${col+1}R${row+1}`); return; }
    drawing.current=true;
    setHist(h=>[...h.slice(-29), framesR.current[fiR.current]]);
    patchFrame(g=>applyTool(g,col,row));
  };
  const onMove = e => {
    const pos=getPos(e); setHov(pos);
    if (!drawing.current||!pos) return;
    const t=toolR.current;
    if (t==='paint'||t==='erase') patchFrame(g=>applyTool(g,pos.col,pos.row));
  };
  const onUp = () => { drawing.current=false; };

  // Text keyboard
  useEffect(() => {
    const h = e => {
      if (toolR.current!=='text'||!curR.current) return;
      const {col,row}=curR.current;
      if (e.key==='Backspace') {
        e.preventDefault();
        const nc=Math.max(col-1,0);
        patchFrame(g=>{const n=clone(g);n[row][nc]=mkCell(' ',fgR.current,bgR.current);return n;});
        setCursor({col:nc,row});
      } else if (e.key==='Enter') { setCursor({col:0,row:Math.min(row+1,ROWS-1)});
      } else if (e.key==='ArrowLeft')  { e.preventDefault(); setCursor({col:Math.max(col-1,0),row});
      } else if (e.key==='ArrowRight') { e.preventDefault(); setCursor({col:Math.min(col+1,COLS-1),row});
      } else if (e.key==='ArrowUp')    { e.preventDefault(); setCursor({col,row:Math.max(row-1,0)});
      } else if (e.key==='ArrowDown')  { e.preventDefault(); setCursor({col,row:Math.min(row+1,ROWS-1)});
      } else if (e.key.length===1) {
        patchFrame(g=>{const n=clone(g);n[row][col]=mkCell(e.key,fgR.current,bgR.current);return n;});
        setCursor({col:Math.min(col+1,COLS-1),row});
      }
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  const undo = () => {
    if (!hist.length) return;
    patchFrame(()=>hist[hist.length-1]);
    setHist(h=>h.slice(0,-1)); setMsg('UNDO');
  };

  // ── Pattern actions ──
  const applyPattern = (key = patPalKey, type = patType) => {
    setHist(h=>[...h.slice(-29), framesR.current[fiR.current]]);
    const seed = Math.random()*999999|0;
    const grid = type === 'symbol' ? genSymbolPattern(key, seed) : type === 'concentric' ? tplConcentric(key) : type === 'dither' ? tplDither(key) : type === 'noise' ? tplNoise(key, seed) : genSymbolPattern(key, seed);
    patchFrame(()=>grid);
    setMsg(`PATTERN: ${PALETTES[key].label}`);
  };

  // ── AI Generate ──
  const generate = async () => {
    if (!aiPr.trim() || gen) return;
    setGen(true); setGenMsg('▶ CONNECTING...');
    const isAnim = aiMode === 'animation';
    try {
      setGenMsg('▶ GENERATING...');
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens: 8192,
          system: aiSys(isAnim, aiN, aiPalKey),
          messages:[{role:'user', content:`Create pure visual teletext art (no text, no words, no letters): ${aiPr}`}],
        }),
      });
      const data = await resp.json();
      if (data.error) throw new Error(data.error.message);
      setGenMsg('▶ PARSING...');
      const raw    = data.content[0].text.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
      const parsed = JSON.parse(raw);
      if (isAnim && parsed.frames && Array.isArray(parsed.frames)) {
        setFrames(parsed.frames.map(cmds => runCmds(cmds)));
        setFi(0); setMsg(`✓ AI: ${parsed.frames.length} FRAMES`);
      } else if (Array.isArray(parsed)) {
        patchFrame(()=>runCmds(parsed)); setMsg('✓ AI: FRAME GENERATED');
      } else { throw new Error('Unexpected response shape'); }
      setAiOpen(false);
    } catch(e) {
      setGenMsg(`✕ ERROR: ${e.message}`);
    } finally { setGen(false); }
  };

  // ── Exports ──
  const exportPNG = () => {
    const off=document.createElement('canvas'); off.width=W*2; off.height=H*2;
    drawGrid(off.getContext('2d'), curGridR.current, null, 2);
    const a=document.createElement('a'); a.download='teletext.png'; a.href=off.toDataURL('image/png'); a.click();
    setMsg('✓ PNG ↓');
  };

  const exportVideo = async () => {
    const fs=framesR.current;
    if (fs.length<2) { setMsg('NEED 2+ FRAMES FOR VIDEO'); return; }
    if (!window.MediaRecorder) { setMsg('MediaRecorder not supported'); return; }
    setExporting(true); setMsg('● REC...');
    try {
      const sc=2, off=document.createElement('canvas');
      off.width=W*sc; off.height=H*sc;
      const ctx=off.getContext('2d');
      const mime=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm';
      const stream=off.captureStream(fps), chunks=[];
      const rec=new MediaRecorder(stream,{mimeType:mime});
      rec.ondataavailable=e=>{if(e.data.size)chunks.push(e.data);};
      const done=new Promise(res=>rec.onstop=()=>{
        const blob=new Blob(chunks,{type:'video/webm'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a'); a.href=url; a.download='teletext-animation.webm'; a.click();
        URL.revokeObjectURL(url); res();
      });
      rec.start();
      const loops=Math.max(3,Math.ceil(10*fps/fs.length));
      for (let l=0;l<loops;l++) for (const frame of fs) {
        drawGrid(ctx,frame,null,sc);
        await new Promise(r=>setTimeout(r,1000/fps));
      }
      rec.stop(); await done;
      setMsg('✓ VIDEO ↓');
    } catch(e) { setMsg(`✕ ${e.message}`); }
    setExporting(false);
  };

  // ── Style helpers ──
  const B = (on=false, ac='#00CCCC') => ({
    background: on ? ac : '#0b0b0b',
    color: on ? '#000' : '#555',
    border:`1px solid ${on ? ac : '#181818'}`,
    fontFamily:"'Courier New',monospace", fontSize:'10px',
    fontWeight:'bold', letterSpacing:'0.8px',
    padding:'5px 8px', cursor:'pointer',
  });
  const PANE={background:'#070707',border:'1px solid #111',padding:'8px'};
  const PL={fontSize:'8px',letterSpacing:'2px',color:'#2a2a2a',marginBottom:'6px'};

  // ── Palette dot row ──
  const PalDots = ({ palKey, onSelect, active }) => (
    <div style={{display:'flex',gap:'4px',alignItems:'center',flexWrap:'wrap'}}>
      {Object.entries(PALETTES).map(([key,p]) => (
        <div key={key} onClick={()=>onSelect(key)} title={p.label}
          style={{ display:'flex', gap:'1px', padding:'3px 5px', cursor:'pointer',
            border:`1px solid ${active===key?'#00CCCC':'#131313'}`,
            background: active===key?'#001a1a':'transparent' }}>
          {p.colors.slice(0,4).map(ci => (
            <div key={ci} style={{width:8,height:8,background:PAL[ci],flexShrink:0}}/>
          ))}
        </div>
      ))}
    </div>
  );

  return (
    <div style={{ background:'#030303', minHeight:'100vh', fontFamily:"'Courier New',monospace",
      color:'#bbb', padding:'8px', display:'flex', flexDirection:'column', gap:'7px', userSelect:'none' }}>

      {/* ── HEADER ── */}
      <div style={{display:'flex',alignItems:'center',gap:'8px',paddingBottom:'8px',borderBottom:'1px solid #0e0e0e'}}>
        <span style={{color:'#00CCCC',fontSize:'12px',fontWeight:'bold',letterSpacing:'3px'}}>▶ TELETEXT STUDIO</span>
        <div style={{flex:1}}/>
        <button onClick={()=>{setAiOpen(true);setGenMsg('');}}
          style={{...B(),background:'#001818',color:'#00CCCC',border:'1px solid #003c3c',padding:'5px 14px',letterSpacing:'1.5px'}}>
          ✦ AI GENERATE
        </button>
        <button onClick={undo} style={B()} disabled={!hist.length} title="Undo">↩</button>
        <button onClick={exportPNG} style={{...B(),color:'#00BB00',border:'1px solid #002500'}}>⬇ PNG</button>
        <button onClick={exportVideo} disabled={exporting}
          style={{...B(),color:exporting?'#CC00CC':'#AA00AA',border:'1px solid #280028'}}>
          {exporting?'● REC…':'⬛ VIDEO'}
        </button>
      </div>

      {/* ── MAIN ── */}
      <div style={{display:'flex',gap:'8px',alignItems:'flex-start',flexWrap:'wrap'}}>

        {/* Canvas */}
        <div>
          <div style={{border:'2px solid #0e0e0e',display:'inline-block',cursor:tool==='text'?'text':'crosshair'}}>
            <canvas ref={canvasRef} width={W} height={H}
              style={{display:'block',width:`${Math.round(W*.85)}px`,height:`${Math.round(H*.85)}px`,imageRendering:'pixelated'}}
              onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp}
              onMouseLeave={()=>{drawing.current=false;setHov(null);}}
              onTouchStart={e=>{e.preventDefault();onDown(e.touches[0]);}}
              onTouchMove={e=>{e.preventDefault();onMove(e.touches[0]);}}
              onTouchEnd={onUp}/>
          </div>
          <div style={{display:'flex',gap:'10px',marginTop:'3px',fontSize:'9px',color:'#222',letterSpacing:'1px'}}>
            <span>40×25</span>
            {hov && <span style={{color:'#333'}}>C{hov.col+1}·R{hov.row+1}</span>}
            <span style={{color:'#333'}}>{tool.toUpperCase()}</span>
            <span style={{marginLeft:'auto',color:'#00CCCC'}}>{msg}</span>
          </div>
        </div>

        {/* Side panel */}
        <div style={{display:'flex',flexDirection:'column',gap:'6px',minWidth:'178px',flex:1}}>

          {/* Tools */}
          <div style={PANE}>
            <div style={PL}>TOOLS</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'3px'}}>
              {TOOLS.map(({id,label}) => (
                <button key={id}
                  onClick={()=>{setTool(id);if(id!=='text')setCursor(null);setMsg(id.toUpperCase());}}
                  style={{...B(tool===id),padding:'5px 4px',fontSize:'10px'}}>{label}</button>
              ))}
            </div>
          </div>

          {/* Colors */}
          <div style={PANE}>
            <div style={PL}>COLORS</div>
            <div style={{fontSize:'8px',color:'#222',letterSpacing:'1px',marginBottom:'3px'}}>FG</div>
            <div style={{display:'flex',gap:'2px',marginBottom:'5px'}}>
              {PAL.map((hex,i)=>(
                <div key={i} onClick={()=>setFg(i)} title={PNAME[i]}
                  style={{width:18,height:18,background:hex,cursor:'pointer',boxSizing:'border-box',
                    border:fg===i?'2px solid #fff':'1px solid #0e0e0e',
                    outline:fg===i?'1px solid #444':'none',outlineOffset:'1px'}}/>
              ))}
            </div>
            <div style={{fontSize:'8px',color:'#222',letterSpacing:'1px',marginBottom:'3px'}}>BG</div>
            <div style={{display:'flex',gap:'2px',marginBottom:'7px'}}>
              {PAL.map((hex,i)=>(
                <div key={i} onClick={()=>setBg(i)} title={PNAME[i]}
                  style={{width:18,height:18,background:hex,cursor:'pointer',boxSizing:'border-box',
                    border:bg===i?'2px solid #fff':'1px solid #0e0e0e',
                    outline:bg===i?'1px solid #444':'none',outlineOffset:'1px'}}/>
              ))}
            </div>
            <div style={{background:PAL[bg],color:PAL[fg],padding:'3px 6px',
              fontSize:'12px',textAlign:'center',letterSpacing:'2px',border:'1px solid #0e0e0e'}}>
              PREVIEW
            </div>
          </div>

          {/* Characters */}
          <div style={PANE}>
            <div style={PL}>CHARACTERS</div>
            <div style={{display:'flex',gap:'3px',marginBottom:'5px'}}>
              {['blocks','symbols'].map(t=>(
                <button key={t} onClick={()=>setCharTab(t)}
                  style={{...B(charTab===t),fontSize:'8px',padding:'2px 6px',flex:1}}>
                  {t.toUpperCase()}
                </button>
              ))}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:'2px'}}>
              {(charTab==='blocks'?BLOCKS:SYMS).map(ch=>(
                <button key={ch} onClick={()=>setSel(ch)}
                  style={{background:selChar===ch?PAL[fg]:'#0b0b0b',
                    color:selChar===ch?PAL[bg]:'#666',
                    border:`1px solid ${selChar===ch?PAL[fg]:'#131313'}`,
                    padding:'3px 0',cursor:'pointer',
                    fontFamily:"'Courier New',monospace",fontSize:'13px',lineHeight:1}}>
                  {ch}
                </button>
              ))}
            </div>
          </div>

          {/* Templates */}
          <div style={PANE}>
            <div style={PL}>TEMPLATES</div>
            {TPLS.map(({id,label})=>(
              <button key={id}
                onClick={()=>{
                  setHist(h=>[...h.slice(-29),framesR.current[fiR.current]]);
                  const seed = Math.random()*999999|0;
                  const grid = id==='blank'       ? mkGrid()
                             : id==='concentric'  ? tplConcentric(patPalKey)
                             : id==='dither'      ? tplDither(patPalKey)
                             : id==='noise'       ? tplNoise(patPalKey, seed)
                             : id==='symbol'      ? genSymbolPattern(patPalKey, seed)
                             : mkGrid();
                  setFrames(p=>{const n=[...p];n[fiR.current]=grid;return n;});
                  setMsg(label);
                }}
                style={{...B(),width:'100%',textAlign:'left',marginBottom:'3px',color:'#4a4a4a',padding:'4px 7px'}}>
                {label}
              </button>
            ))}
          </div>

          {/* Pattern Generator */}
          <div style={{...PANE,border:'1px solid #1a1a00'}}>
            <div style={{...PL,color:'#2a2a00'}}>PATTERN GENERATOR</div>
            <div style={{fontSize:'8px',color:'#2a2a2a',letterSpacing:'1px',marginBottom:'5px'}}>TYPE</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'3px',marginBottom:'8px'}}>
              {[
                {id:'symbol',     label:'× SYMBOL'},
                {id:'concentric', label:'◆ CONCENTRIC'},
                {id:'dither',     label:'░ DITHER'},
                {id:'noise',      label:'▒ NOISE'},
              ].map(({id,label}) => (
                <button key={id} onClick={()=>setPatType(id)}
                  style={{...B(patType===id,'#CCCC00'),fontSize:'9px',padding:'4px'}}>
                  {label}
                </button>
              ))}
            </div>
            <div style={{fontSize:'8px',color:'#2a2a2a',letterSpacing:'1px',marginBottom:'5px'}}>COLOR SCHEME</div>
            <PalDots palKey={patPalKey} active={patPalKey} onSelect={setPatPalKey}/>
            <div style={{fontSize:'8px',color:'#222',letterSpacing:'1px',margin:'4px 0 7px',textAlign:'right'}}>
              {PALETTES[patPalKey].label}
            </div>
            <button onClick={()=>applyPattern(patPalKey, patType)}
              style={{...B(false),width:'100%',color:'#CCCC00',border:'1px solid #2a2a00',
                padding:'6px',fontSize:'10px',letterSpacing:'1px'}}>
              ↺ GENERATE PATTERN
            </button>
          </div>
        </div>
      </div>

      {/* ── TIMELINE ── */}
      <div style={{background:'#060606',border:'1px solid #0f0f0f',padding:'8px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'7px',flexWrap:'wrap'}}>
          <span style={{fontSize:'8px',letterSpacing:'2px',color:'#2a2a2a'}}>TIMELINE</span>
          <button onClick={()=>setPlaying(p=>!p)}
            style={{...B(playing,'#CC00CC'),padding:'4px 12px',fontSize:'10px'}}>
            {playing?'■ STOP':'▶ PLAY'}
          </button>
          <span style={{fontSize:'8px',color:'#222'}}>FPS</span>
          {[2,4,6,8,12].map(f=>(
            <button key={f} onClick={()=>setFps(f)}
              style={{...B(fps===f,'#CCCC00'),padding:'3px 6px',fontSize:'9px'}}>{f}</button>
          ))}
          <div style={{flex:1}}/>
          <button onClick={addFrame} style={{...B(),color:'#00BB00',fontSize:'9px',padding:'3px 8px'}}>+ ADD</button>
          <button onClick={dupFrame} style={{...B(),color:'#CCCC00',fontSize:'9px',padding:'3px 8px'}}>⧉ DUP</button>
          <button onClick={delFrame} style={{...B(),color:'#CC0000',fontSize:'9px',padding:'3px 8px'}}>✕ DEL</button>
          <span style={{fontSize:'9px',color:'#2a2a2a'}}>{fi+1}/{frames.length}</span>
        </div>
        <div style={{display:'flex',gap:'4px',overflowX:'auto',paddingBottom:'4px',minHeight:'52px',alignItems:'center'}}>
          {frames.map((_,i)=>(
            <div key={i} onClick={()=>{if(!playing){setFi(i);setMsg(`FRAME ${i+1}/${frames.length}`);}}}
              style={{position:'relative',cursor:'pointer',flexShrink:0,
                border:`2px solid ${i===fi?(playing?'#CC00CC':'#00CCCC'):'#141414'}`,
                boxSizing:'border-box',transition:'border-color 0.12s'}}>
              {thumbs[i]
                ? <img src={thumbs[i]} alt={`F${i+1}`}
                    style={{display:'block',width:'60px',height:'45px',imageRendering:'pixelated'}}/>
                : <div style={{width:'60px',height:'45px',background:'#0b0b0b'}}/>}
              <div style={{position:'absolute',bottom:0,left:0,right:0,
                background:'rgba(0,0,0,0.8)',fontSize:'8px',letterSpacing:'1px',
                color:i===fi?(playing?'#CC00CC':'#00CCCC'):'#2a2a2a',
                textAlign:'center',padding:'1px 0'}}>
                {i+1}
              </div>
            </div>
          ))}
          <div onClick={addFrame}
            style={{width:'60px',height:'45px',flexShrink:0,border:'1px dashed #181818',
              display:'flex',alignItems:'center',justifyContent:'center',
              cursor:'pointer',color:'#252525',fontSize:'20px'}}>+</div>
        </div>
      </div>

      {/* ── AI MODAL ── */}
      {aiOpen && (
        <div onClick={e=>{if(e.target===e.currentTarget)setAiOpen(false);}}
          style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.94)',
            display:'flex',alignItems:'center',justifyContent:'center',zIndex:300}}>
          <div style={{background:'#070707',border:'1px solid #00CCCC',
            boxShadow:'0 0 80px rgba(0,204,204,0.1)',padding:'24px',
            width:'90%',maxWidth:'540px',maxHeight:'90vh',overflowY:'auto'}}>

            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'18px'}}>
              <div>
                <div style={{color:'#00CCCC',fontSize:'13px',fontWeight:'bold',letterSpacing:'3px'}}>✦ AI GENERATE</div>
                <div style={{color:'#2a2a2a',fontSize:'8px',letterSpacing:'1.5px',marginTop:'2px'}}>PURE VISUAL · NO TEXT OUTPUT</div>
              </div>
              <button onClick={()=>setAiOpen(false)}
                style={{background:'none',border:'none',color:'#333',fontSize:'16px',cursor:'pointer'}}>✕</button>
            </div>

            <div style={{fontSize:'8px',color:'#2a2a2a',letterSpacing:'1.5px',marginBottom:'4px'}}>DESCRIBE A VIBE, OBJECT OR LANDSCAPE</div>
            <textarea value={aiPr} onChange={e=>setAiPr(e.target.value)}
              placeholder="ocean waves at dusk... volcanic ash cloud... forest floor mosaic..."
              rows={3} autoFocus
              style={{width:'100%',background:'#0c0c0c',
                border:`1px solid ${aiPr?'#00CCCC':'#181818'}`,
                color:'#bbb',fontFamily:"'Courier New',monospace",fontSize:'11px',
                letterSpacing:'0.5px',padding:'8px',resize:'none',outline:'none',
                boxSizing:'border-box',transition:'border-color 0.2s',lineHeight:1.5}}/>

            <div style={{margin:'8px 0 12px'}}>
              <div style={{fontSize:'8px',color:'#1e1e1e',letterSpacing:'1px',marginBottom:'4px'}}>QUICK PROMPTS</div>
              <div style={{display:'flex',gap:'3px',flexWrap:'wrap'}}>
                {QUICK_PROMPTS.map(s=>(
                  <button key={s} onClick={()=>setAiPr(s)}
                    style={{...B(aiPr===s),fontSize:'8px',padding:'2px 6px',color:aiPr===s?'#000':'#333'}}>
                    {s}
                  </button>
                ))}
              </div>
            </div>

            {/* Color palette for AI */}
            <div style={{marginBottom:'12px'}}>
              <div style={{fontSize:'8px',color:'#2a2a2a',letterSpacing:'1px',marginBottom:'5px'}}>COLOR SCHEME</div>
              <PalDots palKey={aiPalKey} active={aiPalKey} onSelect={setAiPalKey}/>
              <div style={{fontSize:'8px',color:'#222',letterSpacing:'1px',marginTop:'3px'}}>
                {PALETTES[aiPalKey].label}
              </div>
            </div>

            <div style={{display:'flex',gap:'10px',marginBottom:'12px',alignItems:'flex-end',flexWrap:'wrap'}}>
              <div style={{flex:1,minWidth:'180px'}}>
                <div style={{fontSize:'8px',color:'#2a2a2a',letterSpacing:'1px',marginBottom:'4px'}}>OUTPUT MODE</div>
                <div style={{display:'flex',gap:'3px'}}>
                  <button onClick={()=>setAiMode('single')}
                    style={{...B(aiMode==='single'),flex:1,padding:'7px',fontSize:'10px'}}>
                    ⬛ FRAME
                  </button>
                  <button onClick={()=>setAiMode('animation')}
                    style={{...B(aiMode==='animation','#CC00CC'),flex:1,padding:'7px',fontSize:'10px'}}>
                    ▶ ANIMATE
                  </button>
                </div>
              </div>
              {aiMode==='animation' && (
                <div>
                  <div style={{fontSize:'8px',color:'#2a2a2a',letterSpacing:'1px',marginBottom:'4px'}}>FRAMES</div>
                  <div style={{display:'flex',gap:'2px'}}>
                    {[4,6,8,10,12].map(n=>(
                      <button key={n} onClick={()=>setAiN(n)}
                        style={{...B(aiN===n,'#CCCC00'),padding:'6px 8px',fontSize:'10px'}}>{n}</button>
                    ))}
                  </div>
                </div>
              )}
            </div>

            {genMsg && (
              <div style={{fontSize:'9px',letterSpacing:'1px',padding:'6px 8px',marginBottom:'10px',
                background:'#050505',border:'1px solid #101010',
                color:genMsg.startsWith('✕')?'#CC0000':'#00CCCC'}}>
                {genMsg}
              </div>
            )}

            <button onClick={generate} disabled={gen||!aiPr.trim()}
              style={{...B(true,gen?'#003333':'#00CCCC'),width:'100%',padding:'12px',
                fontSize:'12px',letterSpacing:'2.5px',
                opacity:gen||!aiPr.trim()?0.45:1,
                cursor:gen||!aiPr.trim()?'not-allowed':'pointer',
                background:gen?'#001515':'#00CCCC'}}>
              {gen?(genMsg||'▶ GENERATING…'):`✦ GENERATE${aiMode==='animation'?' '+aiN+' FRAMES':' FRAME'}`}
            </button>

            <div style={{marginTop:'8px',fontSize:'8px',color:'#181818',letterSpacing:'1px',textAlign:'center'}}>
              OUTPUT = PURE VISUALS ONLY · NO TEXT · NO LABELS · ESC TO CLOSE
            </div>
          </div>
        </div>
      )}

      {/* ── FOOTER ── */}
      <div style={{borderTop:'1px solid #0c0c0c',paddingTop:'5px',
        fontSize:'8px',color:'#1a1a1a',letterSpacing:'1px',display:'flex',gap:'16px',flexWrap:'wrap'}}>
        <span>TELETEXT STUDIO v3</span>
        <span>PAINT=DRAG · TEXT=CLICK+TYPE · ↩ UNDO</span>
        <span style={{marginLeft:'auto'}}>VIDEO→WEBM · USE HANDBRAKE FOR MP4</span>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TeletextStudio />);
  </script>
</body>
</html>
